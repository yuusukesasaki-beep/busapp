# my_stops.yaml — 抽出対象バス停の定義
#
# ここを編集すると timetable.json に含まれる対象が変わる。
# pipeline はこのファイルを読み、各データソースから該当バス停の発車時刻だけを抽出する。
# 全路線を入れずファイルを小さく保つこと(設計書 §3)。
#
# ▼ 停留所名は各データソースの実表記に合わせる必要がある。
#   都バスは fetch_toei.py 実装時に GTFS stops.txt を見て確定する。

# --- 都バス(ODPT GTFS-JP: ToeiBus-GTFS.zip)------------------------------
# Phase 1 の実装対象。完了条件は「都05-2 の実ダイヤで『あと○分』が正しく出る」こと。
toei:
  # 対象系統(GTFS route_short_name で照合。全角/半角は正規化されるので半角でよい)。
  # 出入庫便(都05-1出入 → 深川車庫前ゆき)は完全一致で自動除外される。
  routes:
    - "都05-1"
    - "都03"
    - "錦13"
  # GTFS stops.txt の stop_name と照合する対象バス停。
  #   match:      exact=完全一致 / contains=部分一致(既定 exact)
  #   directions: 見たい方面(trip_headsign で照合)。空/未指定なら全方面。
  stops:
    # --- 自宅側: 都心方向の便を見る ---
    - name: "はるみらい前"
      directions: ["東京駅丸の内南口", "四谷駅", "錦糸町駅前"]  # 都05-1 / 都03 / 錦13
    # --- 都心側: 帰り(晴海方面)の便を見る ---
    - name: "東京駅丸の内南口"
      directions: ["晴海埠頭"]                                  # 都05-1
    - name: "銀座四丁目"
      directions: ["晴海埠頭", "晴海五丁目ターミナル"]          # 都05-1 / 都03

# --- 東京BRT(公式サイトのバス停別時刻表ページを HTML パース)--------------
# ODPT カタログに東京BRTの GTFS は無いことを確認済み(2026-07-18)。
# ページはバス停単位・方面タブ構成。directions はタブ見出しへの部分一致で絞る。
# 土休日ダイヤ(2区分)のため saturday には holiday と同じ時刻が入る。
# ▼ 停留所を足すときは fetch_brt.py の STOP_SLUGS に URL 対応を追加すること。
brt:
  stops:
    # --- 自宅側: 都心方向の便を見る ---
    - name: "晴海五丁目ターミナル"                # HARUMI FLAG(B33)
      directions: ["新橋"]                        # (選手村ルート)新橋行
    - name: "晴海BRTターミナル"                   # B22
      directions: ["新橋", "虎ノ門ヒルズ"]        # (晴海・豊洲ルート)新橋・虎ノ門ヒルズ行
    # --- 都心側: 帰り(晴海方面)の便を見る ---
    # 幹線ルート(国際展示場行)は晴海BRTターミナルに停まらないため「晴海」だけで絞る
    - name: "新橋"                                # B01
      directions: ["晴海"]                        # 選手村ルート / 晴海・豊洲ルート
  routes: []  # BRT はバス停ページ単位で取得するため系統フィルタは未使用

# --- 晴海ライナー(Phase 2 で fetcher 実装。今は登録のみ)------------------
# 日立自動車交通の公式ページを HTML パース(更新は年数回)。
harumi:
  stops:
    - name: "晴海二丁目"
      match: exact
  routes: []
